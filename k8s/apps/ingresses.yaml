  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - rajawalikaryamulya.co.id
    - www.rajawalikaryamulya.co.id
    secretName: rkm-frontend-tls
  rules:
  - host: rajawalikaryamulya.co.id
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rkm-frontend
            port:
              number: 80
  - host: www.rajawalikaryamulya.co.id
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rkm-frontend
            port:
